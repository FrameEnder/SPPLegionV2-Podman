# SPP Web Panel — Apache2 VirtualHost
# Equivalent to the Apache24 bundled with the Windows package
<VirtualHost *:80>
    ServerName spp-database
    DocumentRoot /opt/spp/server/Tools/www

    <Directory /opt/spp/server/Tools/www>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog  /opt/spp/server/Logs/apache_error.log
    CustomLog /opt/spp/server/Logs/apache_access.log combined
</VirtualHost>
